<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Raffles | RFL PRO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        :root {
            --bg: #000000;
            --card: #111111;
            --primary-blue: #2481cc;
            --text: #ffffff;
            --text-muted: #8e8e93;
            --accent-green: #34c759;
            --danger: #ff453a;
        }

        /* === ГЛАВНАЯ ЗАЩИТА ОТ СВОРАЧИВАНИЯ (Pull-to-Refresh Setup) === */
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            position: fixed; 
            overflow: hidden; 
            overscroll-behavior-y: none;
            -webkit-tap-highlight-color: transparent;
            /* 🔥 ДОБАВЛЕНО: Делаем страницу гибкой для новой шапки */
            display: flex;
            flex-direction: column;
        }

        /* === КОНТЕЙНЕР ДЛЯ СКРОЛЛА === */
        #main-content {
            height: 100%; /* 🔥 Убрали vh, теперь 100% */
            flex: 1; /* 🔥 Заставляет блок занять ровно остаток экрана под шапкой */
            overflow-y: auto !important; 
            -webkit-overflow-scrolling: touch;
            box-sizing: border-box;
            /* 🔥 ИЗМЕНЕНО: Отступ сверху 0, по бокам 16px, снизу 120px */
            padding: 0px 16px 120px 16px; 
        }

        /* === PULL TO REFRESH СТИЛИ === */
        #pull-to-refresh {
            position: fixed;
            top: -80px;
            left: 0;
            width: 100%;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            background: transparent;
            pointer-events: none;
            padding: 0;
            will-change: transform;
        }

        #pull-to-refresh i {
            font-size: 24px;
            color: var(--primary-blue);
            opacity: 1;
            transform: scale(1);
            transition: opacity 0.2s, transform 0.2s;
            text-shadow: 0 0 15px rgba(36, 129, 204, 0.6);
        }
        
        .header-row { display: flex; justify-content: space-between; align-items: center; margin: 0px 0 20px; }
        h1 { font-size: 28px; font-weight: 800; margin: 0; letter-spacing: -0.5px; }
        
        .history-btn { 
            background: #1c1c1e; min-width: 54px; height: 48px; 
            border-radius: 14px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; color: var(--primary-blue); 
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer; gap: 2px; transition: 0.1s;
        }
        .history-btn span { font-size: 8px; font-weight: 800; text-transform: uppercase; color: var(--text-muted); }

        /* --- КАРТОЧКИ --- */
        .card { 
            background: var(--card); border-radius: 28px; 
            margin-bottom: 16px; position: relative; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            animation: slideUp 0.4s ease; 
            min-height: 250px;
            display: flex; flex-direction: column;
        }

        .card_glow {
            position: absolute; top: -10%; right: -10%;
            width: 250px; height: 250px;
            pointer-events: none;
            opacity: 0.15;
            filter: blur(60px);
            z-index: 0;
        }

        .card_content { padding: 24px; position: relative; z-index: 1; flex: 1; display: flex; flex-direction: column; }

        .r-label { font-size: 11px; font-weight: 700; margin-bottom: 4px; letter-spacing: 1.5px; }
        .r-title { font-size: 16px; font-weight: 800; color: #fff; margin: 0 0 15px 0; line-height: 1.2; max-width: 50%; }

        .conditions { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
        .cond-row { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
        .cond-row i { color: var(--primary-blue); width: 12px; text-align: center; }

        .timer_row { display: flex; gap: 10px; margin-bottom: 15px; }
        .timer_item { display: flex; flex-direction: column; align-items: flex-start; }
        .timer_val { font-size: 20px; font-weight: 700; color: var(--primary-blue); line-height: 1; font-variant-numeric: tabular-nums; }
        .timer_lbl { font-size: 9px; color: var(--primary-blue); margin-top: 2px; font-weight: 600; }

        .prize-img-wrapper { position: absolute; top: 15px; right: -10px; width: 180px; z-index: 2; pointer-events: none; }
        .prize-img { width: 100%; height: auto; object-fit: contain; filter: drop-shadow(0 10px 30px rgba(0,0,0,0.8)); }

        .social_row { margin-top: auto; display: flex; flex-direction: column; gap: 4px; }
        .social_text { font-size: 13px; color: var(--text-muted); font-weight: 500; display: flex; align-items: center; flex-wrap: wrap; }
        .social_text b { color: #fff; }

        /* Стиль для шанса в строке */
        .chance-span {
            color: #ffd700; 
            font-weight: 600;
            margin-left: 10px; 
            cursor: pointer;
            white-space: nowrap;
            font-size: 10px;    
            display: inline-block; 
        }
        .chance-span i {
            margin-left: 3px;
            opacity: 0.8;
            font-size: 10px; 
        }

        .btn-main {
            width: 100%; background: var(--primary-blue); color: #fff;
            border: none; padding: 14px; border-radius: 20px;
            font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.1s;
            margin-top: 12px; text-transform: uppercase;
        }
        .btn-main.joined { background: #1c1c1e; color: var(--accent-green); border: 1px solid rgba(52, 199, 89, 0.2); cursor: default; }

        .user-tickets-info { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 8px; font-weight: 600; }
        .user-tickets-info b { color: var(--primary-blue); }

        .winner_box { 
            margin-top: 10px; background: rgba(255,255,255,0.03); border-radius: 16px; 
            padding: 10px 14px; border: 1px solid rgba(255,255,255,0.05); 
        }
        .w-title { font-size: 9px; color: #ffd700; text-transform: uppercase; font-weight: 800; margin-bottom: 2px; }
        .w-user { font-size: 15px; font-weight: 700; color: #fff; }

        .bottom-spacer { height: 180px; width: 100%; pointer-events: none; }

        /* FOOTER */
        .app-footer {
            display: flex; justify-content: space-around; align-items: center;
            background-color: rgba(28, 28, 30, 0.85); backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed; bottom: 0; left: 0; width: 100%; z-index: 9999;
            padding-top: 8px; padding-bottom: calc(8px + env(safe-area-inset-bottom));
        }
        .footer-item { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: #8E8E93; text-decoration: none; flex: 1; font-size: 10px; }
        .footer-item .icon-wrapper { font-size: 22px; }

        .hidden { display: none !important; }
        
        /* История (Overlay) */
        .history-overlay { 
            position: fixed; inset: 0; background: var(--bg); z-index: 2500; 
            padding: 16px; overflow-y: auto; display: none; 
            padding-bottom: 120px; /* Чтобы контент не перекрывал футер или низ */
        }
        .history-overlay.active { display: block; }
        
        /* МОДАЛКИ */
        .modal-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(20px); z-index: 3000; display: none; 
            align-items: center; justify-content: center; 
        }
        .modal-box { 
            background: #1c1c1e; width: 85%; border-radius: 24px; padding: 30px 20px; 
            text-align: center; border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            animation: zoom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .m-btn-confirm { background: var(--primary-blue); color: #fff; border: none; flex: 1; padding: 14px; border-radius: 12px; font-weight: 700; }
        .m-btn-cancel { background: rgba(255,255,255,0.05); color: #fff; border: none; flex: 1; padding: 14px; border-radius: 12px; font-weight: 600; }
        
        .m-head { font-size: 22px; font-weight: 800; margin-bottom: 8px; color: #fff; }
        .m-desc { font-size: 15px; color: var(--text-muted); margin-bottom: 25px; line-height: 1.4; }
        .m-btn { 
            background: rgba(255,255,255,0.1); color: #fff; border: none; width: 100%; 
            padding: 14px; border-radius: 12px; font-weight: 600; font-size: 16px; cursor: pointer; margin-bottom: 10px;
        }
        .m-btn-primary { background: var(--primary-blue); color: #fff; font-weight: 700; }

        /* АНИМАЦИИ */
        .icon-container { width: 80px; height: 80px; margin: 0 auto 15px; position: relative; }
        .checkmark-circle { stroke-dasharray: 166; stroke-dashoffset: 166; stroke-width: 2; stroke-miterlimit: 10; stroke: var(--accent-green); fill: none; animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards; }
        .checkmark { width: 80px; height: 80px; border-radius: 50%; display: block; stroke-width: 2; stroke: #fff; stroke-miterlimit: 10; margin: 10% auto; box-shadow: inset 0px 0px 0px var(--accent-green); animation: fill .4s ease-in-out .4s forwards, scale .3s ease-in-out .9s both; }
        .checkmark-check { transform-origin: 50% 50%; stroke-dasharray: 48; stroke-dashoffset: 48; animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.8s forwards; }
        .cross-circle { stroke-dasharray: 166; stroke-dashoffset: 166; stroke-width: 2; stroke-miterlimit: 10; stroke: var(--danger); fill: none; animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards; }
        .cross { width: 80px; height: 80px; border-radius: 50%; display: block; stroke-width: 2; stroke: #fff; stroke-miterlimit: 10; margin: 10% auto; box-shadow: inset 0px 0px 0px var(--danger); animation: fill-red .4s ease-in-out .4s forwards, shake .3s ease-in-out .9s both; }
        .cross-path { transform-origin: 50% 50%; stroke-dasharray: 48; stroke-dashoffset: 48; animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.8s forwards; }

        .verify-modal-content {
            background: #1c1c1e;
            padding: 30px 40px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            animation: zoom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .verify-loader { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.05); border-top: 4px solid var(--primary-blue); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        .verify-text { font-size: 18px; font-weight: 700; color: #fff; text-align: center; margin: 0; line-height: 1.3; }
        .verify-subtext { font-size: 13px; color: var(--text-muted); font-weight: 500; text-align: center; margin-top: 6px; display: block; }

        @keyframes stroke { 100% { stroke-dashoffset: 0; } }
        @keyframes scale { 0%, 100% { transform: none; } 50% { transform: scale3d(1.1, 1.1, 1); } }
        @keyframes fill { 100% { box-shadow: inset 0px 0px 0px 50px var(--accent-green); } }
        @keyframes fill-red { 100% { box-shadow: inset 0px 0px 0px 50px var(--danger); } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 10%, 30%, 50%, 70%, 90% {transform: translateX(-5px);} 20%, 40%, 60%, 80% {transform: translateX(5px);} }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes zoom { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .fa-spin {
    animation: spin 1s linear infinite !important;
}
/* 🔥 ПРИЖИМАЕМ КОНТЕНТ К ШАПКЕ 🔥 */
        .top-header {
            margin-bottom: 5px !important; /* Было 35px в top_nav.js */
        }

        /* Если хочется поднять прям вплотную, можно немного сдвинуть сам скролл-контейнер */
        #main-content {
            margin-top: -5px; 
        }
        
    </style>
</head>
<body>

    <div id="pull-to-refresh">
        <i class="fa-solid fa-rotate-right"></i> 
    </div>

    <main id="main-content">
        <div class="header-row">
            <h1>Розыгрыши</h1>
            <div class="history-btn" onclick="openHistory()">
                <i class="fa-solid fa-clock-rotate-left"></i>
                <span>История</span>
            </div>
        </div>

        <div id="list">
            <div style="text-align:center; margin-top:50px; color:var(--text-muted);">
                <i class="fa-solid fa-spinner fa-spin fa-2x"></i>
            </div>
        </div>

        <div id="close-btn-container" class="close-container hidden" style="position: fixed; bottom: 90px; width: 100%; text-align: center; z-index: 99; left: 0;">
            <button class="btn-main" style="width: auto; padding: 10px 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);" onclick="tg.close()">Закрыть</button>
        </div>
    </main>

    <div id="history-overlay" class="history-overlay">
        <div class="header-row">
            <h1>История</h1>
            <i class="fa-solid fa-xmark" style="font-size: 24px;" onclick="closeHistory()"></i>
        </div>
        <div id="total-count" style="font-size: 13px; font-weight: 500; color: var(--text-muted); margin-top: -15px; margin-bottom: 20px; letter-spacing: 0;">Разыграно: --</div>
        <div id="history-list"></div>
    </div>

    <!-- НИЖНИЙ И ВЕРХНИЙ БАР -->
<script src="/top_nav.js" defer></script>
<script src="/bottom-nav.js"></script>

    <div id="confirm-modal" class="modal-overlay">
        <div class="modal-box">
            <div style="font-size: 50px; margin-bottom: 15px;">🎫</div>
            <div style="font-size: 22px; font-weight: 800; margin-bottom: 8px; color: #fff;">Подтвердите</div>
            <div style="color: var(--text-muted); margin-bottom: 25px;">Списать <b id="ticket-price" style="color:#fff">--</b> билетов?</div>
            <div class="modal-btns">
                <button class="m-btn-cancel" onclick="closeConfirm()">Отмена</button>
                <button class="m-btn-confirm" id="confirm-join-btn">Да, списать</button>
            </div>
        </div>
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal-box">
            <div id="modal-icon" class="icon-container"></div>
            <div class="m-head" id="m-head"></div>
            <div class="m-desc" id="m-desc"></div>
            <button id="btn-profile" class="m-btn m-btn-primary" style="display:none;" onclick="location.href='/profile'">⚙️ Настроить профиль</button>
            <button id="btn-bp" class="m-btn m-btn-primary" style="display:none; background: #ffd700; color: #000; box-shadow: 0 4px 15px rgba(255,215,0,0.3);" onclick="location.href='/checkpoint'">🌟 Перейти в Battle Pass</button>
            <button class="m-btn" onclick="document.getElementById('modal').style.display='none'">Понятно</button>
        </div>
    </div>

    <div id="verify-modal" class="modal-overlay" style="z-index: 3000;">
        <div class="verify-modal-content">
            <div class="verify-loader"></div>
            <div class="verify-text">Проверяем условия...</div>
            <span class="verify-subtext">Секундочку, сверяем данные</span>
        </div>
    </div>

    <script>
        // 👇 ДОБАВЬ ЭТОТ БЛОК В САМОЕ НАЧАЛО СКРИПТА 👇
        window.makeApiRequest = async function(url, data = {}, method = 'POST', silent = false) {
            const options = {
                method: method,
                headers: { 'Content-Type': 'application/json' },
            };
            if (method === 'POST') {
                options.body = JSON.stringify({ initData: window.Telegram?.WebApp?.initData || '', ...data });
            }
            const response = await fetch(url, options);
            if (!response.ok) throw new Error('API Error');
            return await response.json();
        };
        // 👆 КОНЕЦ БЛОКА 👆
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.BackButton.hide();

        let userTickets = 0;

        // === PULL TO REFRESH ЛОГИКА ===
        function initPullToRefresh() {
            const content = document.getElementById('main-content');
            const ptrContainer = document.getElementById('pull-to-refresh');
            const icon = ptrContainer ? ptrContainer.querySelector('i') : null;
            
            if (!content || !ptrContainer || !icon) return;

            let startY = 0;
            let pulledDistance = 0;
            let isPulling = false;
            const triggerThreshold = 80;

            content.addEventListener('touchstart', (e) => {
                if (content.scrollTop <= 0) {
                    startY = e.touches[0].clientY;
                    isPulling = true;
                    content.style.transition = 'none'; 
                    ptrContainer.style.transition = 'none'; 
                    icon.style.transition = 'none';
                } else {
                    isPulling = false;
                }
            }, { passive: true });

            content.addEventListener('touchmove', (e) => {
                if (!isPulling) return;
                const currentY = e.touches[0].clientY;
                const diff = currentY - startY;

                if (diff > 0 && content.scrollTop <= 0) {
                    if (e.cancelable) e.preventDefault();
                    pulledDistance = Math.pow(diff, 0.85); 
                    if (pulledDistance > 180) pulledDistance = 180;

                    content.style.transform = `translateY(${pulledDistance}px)`;
                    ptrContainer.style.transform = `translateY(${pulledDistance}px)`;
                    icon.style.transform = `rotate(${pulledDistance * 2.5}deg)`;
                    
                    if (pulledDistance > triggerThreshold) {
                        icon.style.color = "#34c759";
                    } else {
                        icon.style.color = "var(--primary-blue)";
                    }
                }
            }, { passive: false });

            content.addEventListener('touchend', () => {
                if (!isPulling) return;
                isPulling = false;
                
                content.style.transition = 'transform 0.3s ease-out';
                ptrContainer.style.transition = 'transform 0.3s ease-out';

                if (pulledDistance > triggerThreshold) {
                    content.style.transform = `translateY(80px)`;
                    ptrContainer.style.transform = `translateY(80px)`;
                    
                    // 🔥 ИСПРАВЛЕНИЕ: Сбрасываем inline-стиль поворота, чтобы заработал класс fa-spin
                    icon.style.transform = ''; 
                    icon.classList.add('fa-spin');
                    
                    if (window.Telegram && Telegram.WebApp.HapticFeedback) {
                        Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                    }
                    setTimeout(() => { window.location.reload(); }, 500);
                } else {
                    content.style.transform = 'translateY(0px)';
                    ptrContainer.style.transform = 'translateY(0px)';
                    icon.style.transform = 'rotate(0deg)';
                }
                pulledDistance = 0;
            });
        }
            
        // --- 📳 ВИБРАЦИЯ (HAPTIC FEEDBACK) 📳 ---
        document.body.addEventListener('click', (e) => {
            const selector = `a, button, .history-btn, .card, .m-btn, .chance-span`;
            if (e.target.closest(selector)) {
                if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
                    try {
                        window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
                    } catch (err) { console.warn("Haptic error:", err); }
                }
            }
        });

        function openHistory() { 
            document.getElementById('history-overlay').classList.add('active'); 
            tg.HapticFeedback.impactOccurred('light');
        }
        function closeHistory() { document.getElementById('history-overlay').classList.remove('active'); }
        function closeConfirm() { document.getElementById('confirm-modal').style.display = 'none'; }

        // Показ информации о шансах
        function showChanceInfo(e) {
            e.stopPropagation(); 
            showModal('info', 'Шанс победы', 'Процент победы рассчитывается делением 100% на количество участников. Чем больше участников, тем ниже шанс, но победить может каждый! 🍀');
        }

        // Склонение участников
        function getPlural(n, titles) {
            return titles[(n % 10 === 1 && n % 100 !== 11) ? 0 : n % 10 >= 2 && n % 10 <= 4 && (n % 100 < 10 || n % 100 >= 20) ? 1 : 2];
        }

        // Обновление таймеров
        setInterval(() => {
            document.querySelectorAll('.timer-data').forEach(el => {
                const endTime = new Date(el.dataset.time);
                const diff = endTime - new Date();
                if (diff <= 0) {
                    el.innerHTML = '<span style="color:var(--danger); font-weight:700;">ЗАВЕРШАЕТСЯ...</span>';
                    return;
                }
                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
                const m = Math.floor((diff / (1000 * 60)) % 60);
                const s = Math.floor((diff / 1000) % 60);
                el.querySelector('.d-v').innerText = d;
                el.querySelector('.h-v').innerText = h;
                el.querySelector('.m-v').innerText = m;
                el.querySelector('.s-v').innerText = s;
            });
        }, 1000);

        async function load() {
            try {
                // Грузим профиль
                const uRes = await fetch('/api/v1/user/me', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({initData:tg.initData}) });
                const uData = await uRes.json();
                userTickets = uData.tickets || 0;

                const res = await fetch('/api/v1/raffles/active', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({initData:tg.initData}) });
                const data = await res.json();
                render(data);
                checkDeepLink(); 
            } catch(e) { document.getElementById('list').innerHTML = '<p style="text-align:center">Ошибка сети</p>'; }
        }

function render(data) {
    const list = document.getElementById('list');
    const historyList = document.getElementById('history-list');
    list.innerHTML = ''; historyList.innerHTML = '';
    
    let completedCount = 0;
    let activeRendered = 0;

    // 🔥 1. ЖЕЛЕЗОБЕТОННЫЙ ФИЛЬТР (Выкидываем всё, что не должно быть видно)
    const validData = data.filter(r => {
        if (r.status === 'scheduled') return false; // Скрываем отложенные
        if (r.status === 'completed' && !r.winner) return false; // Скрываем отмененные
        // Если у тебя есть флаг видимости в БД (например is_hidden), раскомментируй строку ниже:
        // if (r.is_hidden === true || r.is_visible === false) return false;
        
        return true; // Остальные пропускаем дальше
    });

    // 🔥 2. РАЗДЕЛЯЕМ МАССИВ (Активные и Завершенные)
    let activeRaffles = validData.filter(r => r.status !== 'completed');
    let completedRaffles = validData.filter(r => r.status === 'completed');

    // 🔥 3. СОРТИРОВКА АКТИВНЫХ (Те, что заканчиваются раньше - наверх)
    activeRaffles.sort((a, b) => new Date(a.end_time || 0) - new Date(b.end_time || 0));

    // 🔥 4. СОРТИРОВКА ЗАВЕРШЕННЫХ (Самые свежие прошедшие - наверх)
    completedRaffles.sort((a, b) => new Date(b.end_time || 0) - new Date(a.end_time || 0));

    // 🔥 5. ОБЪЕДИНЯЕМ И ЗАПУСКАЕМ ЦИКЛ
    const sortedData = [...activeRaffles, ...completedRaffles];

    sortedData.forEach(r => {
        const done = r.status === 'completed';
        const isTwitch = r.type && r.type.includes('twitch'); // Проверка на Твич-розыгрыш
        const s = r.settings || {};
        const pCount = r.participants_count || 0; // Получаем участников раньше, чтобы использовать в условиях
        
        if(done) completedCount++;
        else activeRendered++;

        // Приоритет картинки: card_image -> prize_image
        const img = s.card_image || s.prize_image || r.image_url || '';
        const rarityColor = s.rarity_color || (isTwitch ? '#9146FF' : '#2481cc'); 
        
        // Исправлено: Защита от undefined
        const prizeName = s.prize_name || r.title || 'Приз';
        const fullPrizeName = `${prizeName} ${s.skin_quality ? `(${s.skin_quality})` : ''}`;

        let conditions = '';
        if (!done) {
            if (isTwitch) {
                // Если это Твич-розыгрыш, выводим его условия
                conditions += `<div class="cond-row"><i class="fa-brands fa-twitch" style="color:#9146FF;"></i> Участие на трансляции</div>`;
                if (s.cost) conditions += `<div class="cond-row"><i class="fa-solid fa-coins" style="color:#ffd700;"></i> ${s.cost} баллов канала</div>`;
                if (s.min_lifetime_msgs > 0) conditions += `<div class="cond-row"><i class="fa-solid fa-comment-dots" style="color:#9146FF;"></i> Мин. сообщений: ${s.min_lifetime_msgs}</div>`;
                if (s.is_for_newbies) conditions += `<div class="cond-row"><i class="fa-solid fa-seedling" style="color:#34c759;"></i> Только для новых зрителей</div>`;
            } else {
                // Стандартные условия TG-розыгрышей
                if (s.requires_telegram_sub) conditions += `<div class="cond-row"><i class="fa-brands fa-telegram"></i> Канал</div>`;
                
                // --- НОВАЯ ЛОГИКА ПЕРИОДОВ ---
                const minMsgs = s.min_messages || s.min_daily_messages || 0;
                const msgPeriod = s.message_period || 'daily';
                const periodMap = {
                    'daily': 'за стрим',
                    'weekly': 'за неделю',
                    'monthly': 'за месяц'
                };
                const periodStr = periodMap[msgPeriod] || 'за стрим';

                if (minMsgs > 0) {
                    conditions += `<div class="cond-row"><i class="fa-brands fa-twitch"></i> Сообщений ${periodStr}: ${minMsgs}</div>`;
                }
                // -----------------------------
                
                if (s.min_participants > 0) conditions += `<div class="cond-row"><i class="fa-solid fa-users"></i> Мин. участников: ${s.min_participants}</div>`;
                if (s.min_bp_level > 0) conditions += `<div class="cond-row"><i class="fa-solid fa-star" style="color: #ffd700;"></i> БП Уровень: ${s.min_bp_level}</div>`;
            }

            // 🔥 БЛОК СТУПЕНЕЙ (ДИНАМИЧЕСКИЙ АПГРЕЙД ПРИЗА)
            if (s.steps && Array.isArray(s.steps) && s.steps.length > 0) {
                const sortedSteps = [...s.steps].sort((a, b) => parseInt(a.participants_required) - parseInt(b.participants_required));
                
                conditions += `<div style="margin-top: 8px; padding-top: 8px; border-top: 1px dashed rgba(255,255,255,0.08); display: flex; flex-direction: column; gap: 4px;">`;
                conditions += `<div style="font-size: 9px; color: ${rarityColor}; text-transform: uppercase; margin-bottom: 2px; font-weight: 800; letter-spacing: 0.5px;">Ступени (Апгрейд приза):</div>`;
                
                sortedSteps.forEach(step => {
                    const req = parseInt(step.participants_required);
                    const isUnlocked = pCount >= req;
                    
                    if (isUnlocked) {
                        conditions += `
                        <div class="cond-row" style="opacity: 1;">
                            <i class="fa-solid fa-lock-open" style="color: var(--accent-green); font-size: 10px;"></i>
                            <span style="color: #fff; font-weight: 600;">${req} чел <i class="fa-solid fa-arrow-right" style="font-size: 8px; margin: 0 4px; color: var(--text-muted); width: auto;"></i> ${step.prize_name}</span>
                            <i class="fa-solid fa-check" style="color: var(--accent-green); font-size: 10px; margin-left: 2px; width: auto;"></i>
                        </div>`;
                    } else {
                        // Вычисляем сколько осталось
                        const left = req - pCount;
                        conditions += `
                        <div class="cond-row" style="opacity: 0.6;">
                            <i class="fa-solid fa-lock" style="color: var(--text-muted); font-size: 10px;"></i>
                            <span style="color: var(--text-muted);"><b>${req} чел</b> <i class="fa-solid fa-arrow-right" style="font-size: 8px; margin: 0 4px; color: var(--text-muted); width: auto;"></i> ${step.prize_name} <span style="font-size: 9px; color: var(--primary-blue); font-weight: 600; margin-left: 4px;">(ещё ${left})</span></span>
                        </div>`;
                    }
                });
                conditions += `</div>`;
            }
        }

        // Логика кнопок
        let btnHtml = "";
        let ticketInfo = "";

        if (!done) {
            if (isTwitch) {
                // 🔥 ТВИЧ КНОПКА
                btnHtml = `<button class="btn-main" style="background: #9146FF; color: #fff; box-shadow: 0 4px 15px rgba(145, 70, 255, 0.3);" onclick="window.Telegram.WebApp.openLink('https://twitch.tv/hatelove_ttv')">
                            <i class="fa-brands fa-twitch"></i> ПЕРЕЙТИ НА TWITCH
                           </button>`;
                ticketInfo = `<div class="user-tickets-info">Напишите <b style="color:#9146FF;">!розыгрыш</b> в чате стрима</div>`;
            } else {
                // Стандартная кнопка Telegram
                let btnLabel = "УЧАСТВОВАТЬ";
                if (!r.is_joined && s.ticket_cost > 0) {
                    btnLabel = `ЗАПЛАТИТЬ ${s.ticket_cost} БИЛЕТОВ`;
                    ticketInfo = `<div class="user-tickets-info">У вас: <b>${userTickets}</b> билетов</div>`;
                }
                btnHtml = `<button class="btn-main ${r.is_joined ? 'joined' : ''}" onclick="handleJoin(${r.id}, ${s.ticket_cost || 0}, ${r.is_joined})">
                            ${r.is_joined ? '<i class="fa-solid fa-check"></i> Вы участвуете' : btnLabel}
                           </button>`;
            }
        }

        let pTextFinal = done ? 'Розыгрыш завершен' : `<b style="margin-right: 6px;">${pCount}</b>${getPlural(pCount, ['участник', 'участника', 'участников'])}`;

        if (!done && pCount > 0) {
            const chanceVal = (100 / pCount).toFixed(2).replace('.00', '');
            pTextFinal += `<span class="chance-span" onclick="showChanceInfo(event)"> 🔥 Шанс: ${chanceVal}% <i class="fa-regular fa-circle-question"></i></span>`;
        }
        
        // Блок победителя
        let winnerBoxContent = '';
        if (r.winner) {
            winnerBoxContent = `<div class="w-user">🏆 ${r.winner.full_name || r.winner.twitch_login || 'Победитель'}</div>`;
        } else {
            winnerBoxContent = `<div class="w-user">⏳ Выбор победителя...</div>`;
        }

        // Исправлено: Защита от NaN в таймере
        let timerBlock = '';
        if (!done) {
            if (r.end_time) {
                timerBlock = `
                    <div class="timer_row timer-data" data-time="${r.end_time}">
                        <div class="timer_item"><span class="timer_val d-v">0</span><span class="timer_lbl">дн</span></div>
                        <div class="timer_item"><span class="timer_val h-v">0</span><span class="timer_lbl">час</span></div>
                        <div class="timer_item"><span class="timer_val m-v">0</span><span class="timer_lbl">мин</span></div>
                        <div class="timer_item"><span class="timer_val s-v">0</span><span class="timer_lbl">сек</span></div>
                    </div>`;
            } else if (isTwitch) {
                // Если таймера нет и это твич - выводим красивую плашку
                timerBlock = `<div style="font-size:13px; font-weight:800; color:#9146FF; margin-bottom:15px; letter-spacing: 0.5px;"><i class="fa-solid fa-bolt"></i> ИТОГИ НА СТРИМЕ</div>`;
            }
        }

        const cardHtml = `
        <div class="card ${done ? 'done' : ''}">
            <div class="card_glow" style="background: radial-gradient(circle, ${rarityColor} 100%, transparent 75%);"></div>
            <div class="card_content">
                <div class="prize-img-wrapper"><img src="${img}" class="prize-img" onerror="this.style.display='none'"></div>
                <div class="r-label" style="color: ${rarityColor}">${isTwitch ? 'TWITCH РОЗЫГРЫШ' : 'РОЗЫГРЫШ'}</div>
                <h3 class="r-title">${fullPrizeName}</h3>
                ${!done ? `<div class="conditions">${conditions}</div>` : ''}
                ${timerBlock}
                <div class="social_row">
                    <div class="social_text">${pTextFinal}</div>
                </div>
                ${!done ? `
                    ${btnHtml}
                    ${ticketInfo}
                ` : `
                    <div class="winner_box">
                        <div class="w-title" style="color:${rarityColor}">Итоги</div>
                        ${winnerBoxContent}
                    </div>
                `}
            </div>
        </div>`;

        if (done) historyList.innerHTML += cardHtml;
        else list.innerHTML += cardHtml;
    });

    if (activeRendered === 0) { 
        list.innerHTML = '<div style="text-align:center; margin-top:50px; color:var(--text-muted);">Активных розыгрышей нет 👻</div>'; 
    }

    document.getElementById('total-count').innerText = `Разыграно: ${completedCount}`;
    list.innerHTML += '<div class="bottom-spacer"></div>';
    historyList.innerHTML += '<div class="bottom-spacer"></div>';
}
        
        // Обработка нажатия на кнопку (проверка билетов)
        function handleJoin(id, cost, isJoined) {
            if(isJoined) return;
            if (cost > 0) {
                document.getElementById('ticket-price').innerText = cost;
                document.getElementById('confirm-modal').style.display = 'flex';
                document.getElementById('confirm-join-btn').onclick = () => { closeConfirm(); join(id); };
            } else { join(id); }
        }

        // ГЛАВНАЯ ФУНКЦИЯ УЧАСТИЯ
        async function join(id, isAuto = false) {
            let btn = null;
            let oldHtml = '';
            
            // Если вызов от пользователя (клик), меняем кнопку на спиннер
            if(!isAuto && window.event) {
                tg.HapticFeedback.impactOccurred('medium');
                let target = window.event.target;
                if(target.tagName !== 'BUTTON') target = target.closest('button');
                
                if (target && !target.classList.contains('joined')) {
                    btn = target;
                    oldHtml = btn.innerHTML;
                    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
                    btn.style.opacity = '0.7';
                }
            }
            
            try {
                const res = await fetch('/api/v1/raffles/join', { 
                    method: 'POST', headers: {'Content-Type':'application/json'}, 
                    body: JSON.stringify({initData:tg.initData, raffle_id:id}) 
                });
                const ans = await res.json();
                
                if(res.ok) {
                    tg.HapticFeedback.notificationOccurred('success');
                    
                    // 🔥 Если в ответе есть предупреждение про 20%, показываем синюю инфо-модалку
                    if (ans.message.includes("снижены на 20%")) {
                        const formattedMsg = ans.message.replace(/\n/g, '<br>');
                        showModal('info', '⚠️ Внимание! ⚠️', formattedMsg);
                    } else {
                        showModal('success', 'Успех!', ans.message);
                    }
                    
                    load(); 
                } else {
                    tg.HapticFeedback.notificationOccurred('error');
                    
                    // 🔥 Ловим ошибку Баттл-пасса и показываем наш красивый дизайн
                    if (ans.detail && ans.detail.includes('Battle Pass')) {
                        const bpMsg = `${ans.detail}<br><br><span style="font-size: 12px; color: var(--text-muted);">Перейдите в Баттл-пасс и наберите необходимый уровень, чтобы участвовать в таких розыгрышах!</span>`;
                        showModal('bp_error', 'Доступ закрыт 🛑', bpMsg);
                    } else {
                        showModal('error', 'Упс...', ans.detail);
                    }

                    if(btn) {
                        btn.innerHTML = oldHtml;
                        btn.style.opacity = '1';
                    }
                }
            } catch(e) {
                tg.HapticFeedback.notificationOccurred('error');
                showModal('error', 'Ошибка', 'Проверьте соединение');
                if(btn) {
                    btn.innerHTML = oldHtml;
                    btn.style.opacity = '1';
                }
            }
        }

       // ФУНКЦИЯ ПОКАЗА МОДАЛКИ
        function showModal(type, title, msg) {
            const m = document.getElementById('modal');
            const iconBox = document.getElementById('modal-icon');
            const btnProfile = document.getElementById('btn-profile');
            const btnBp = document.getElementById('btn-bp'); // 🔥 Наша новая кнопка
            
            // Сбрасываем видимость кнопок
            btnProfile.style.display = 'none';
            btnBp.style.display = 'none';

            if(type === 'success') {
                iconBox.innerHTML = `<svg class="checkmark" viewBox="0 0 52 52"><circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"/><path class="checkmark-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/></svg>`;
            } else if (type === 'info') {
                // Иконка для информации
                iconBox.innerHTML = '<i class="fa-solid fa-circle-info" style="font-size: 60px; color: var(--primary-blue); margin-top: 10px;"></i>';
            } else if (type === 'bp_error') {
                // 🔥 Крутая золотая звезда с тенью для БП
                iconBox.innerHTML = '<i class="fa-solid fa-star" style="font-size: 60px; color: #ffd700; margin-top: 10px; filter: drop-shadow(0 0 15px rgba(255,215,0,0.6));"></i>';
                btnBp.style.display = 'block'; // Показываем кнопку перехода в БП
            } else {
                iconBox.innerHTML = `<svg class="cross" viewBox="0 0 52 52"><circle class="cross-circle" cx="26" cy="26" r="25" fill="none"/><path class="cross-path" fill="none" d="M16 16 36 36 M36 16 16 36"/></svg>`;
                const mLow = msg ? msg.toLowerCase() : '';
                btnProfile.style.display = (mLow.includes('trade') || mLow.includes('twitch') || mLow.includes('профиль') || mLow.includes('билет')) ? 'block' : 'none';
            }

            document.getElementById('m-head').innerText = title;
            document.getElementById('m-desc').innerHTML = msg;
            m.style.display = 'flex';
        }

        // ЛОГИКА DEEPLINK
        async function checkDeepLink() {
            const startParam = tg.initDataUnsafe.start_param; 
            
            if (startParam && startParam.startsWith('raffle_')) {
                const closeBtn = document.getElementById('close-btn-container');
                if(closeBtn) closeBtn.classList.remove('hidden');

                const raffleId = startParam.split('_')[1];
                
                if (!sessionStorage.getItem('checked_raffle_' + raffleId)) {
                    const vModal = document.getElementById('verify-modal');
                    if(vModal) vModal.style.display = 'flex';
                    
                    tg.HapticFeedback.impactOccurred('light');
                    
                    await new Promise(r => setTimeout(r, 1000));
                    
                    sessionStorage.setItem('checked_raffle_' + raffleId, 'true');
                    await join(raffleId, true); 
                    
                    if(vModal) vModal.style.display = 'none';
                }
            }
        }

        // Запуск инициализаций
        document.addEventListener('DOMContentLoaded', initPullToRefresh);
        load();
    </script>
