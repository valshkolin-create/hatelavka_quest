<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HATElove Twitch Drop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        
        body {
            background-color: #0a0a0c; color: #fff; font-family: 'Montserrat', sans-serif;
            margin: 0; padding: 20px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; min-height: 100vh; text-align: center;
            box-sizing: border-box;
        }
        
        .twitch-logo { 
            font-size: 60px; color: #9146FF; margin-bottom: 15px; 
            filter: drop-shadow(0 0 20px rgba(145, 70, 255, 0.4)); 
        }
        
        h1 { 
            font-size: 22px; font-weight: 900; margin: 0 0 15px 0; 
            text-transform: uppercase; letter-spacing: 1px; line-height: 1.3;
        }
        h1 span { color: #9146FF; }

        .description { 
            font-size: 13px; color: #aaa; margin-bottom: 25px; 
            line-height: 1.6; max-width: 320px; 
        }

        /* Карточка с призом */
        .prize-card {
            background: linear-gradient(135deg, rgba(145, 70, 255, 0.15) 0%, rgba(145, 70, 255, 0.05) 100%);
            border: 1px solid rgba(145, 70, 255, 0.3);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 320px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
            display: none; /* Скрыта до загрузки данных */
            animation: fadeIn 0.5s ease;
        }
        .prize-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: #9146FF;
        }
        .prize-label { font-size: 10px; color: #aaa; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; margin-bottom: 5px; }
        .prize-name { font-size: 18px; font-weight: 900; color: #fff; margin-bottom: 12px; text-shadow: 0 0 10px rgba(255,255,255,0.1); }
        .prize-count { font-size: 13px; color: #ffd700; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 6px; }
        
        .btn-twitch {
            background: #9146FF; color: #fff; border: none; padding: 20px;
            border-radius: 16px; font-size: 15px; font-weight: 900; width: 100%; max-width: 320px;
            text-transform: uppercase; cursor: pointer; transition: 0.2s;
            box-shadow: 0 8px 25px rgba(145, 70, 255, 0.4);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-twitch:active { transform: scale(0.96); box-shadow: 0 4px 15px rgba(145, 70, 255, 0.4); }
        .btn-twitch:disabled { opacity: 0.7; transform: none; }
        
        .result-box {
            margin-top: 20px; padding: 15px; border-radius: 12px; font-size: 13px; 
            font-weight: 700; display: none; width: 100%; max-width: 320px; box-sizing: border-box;
            line-height: 1.5; animation: fadeIn 0.4s ease;
        }
        .result-winner { background: rgba(40, 167, 69, 0.15); border: 1px solid #28a745; color: #28a745; }
        .result-participant { background: rgba(255, 184, 0, 0.15); border: 1px solid #FFB800; color: #FFB800; }
        .result-expired { background: rgba(255, 77, 77, 0.15); border: 1px solid #ff4d4d; color: #ff4d4d; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <i class="fa-brands fa-twitch twitch-logo"></i>
    <h1>Переход на страницу<br><span>HATElove</span></h1>
    
    <div class="description">
        Стрим уже идет! Залетай на трансляцию прямо сейчас. Успеешь в числе первых — система автоматически выдаст тебе дроп. Остальные получат билеты!
    </div>

    <div class="prize-card" id="prize-card">
        <div class="prize-label">Главный приз:</div>
        <div class="prize-name" id="prize-name"><i class="fa-solid fa-spinner fa-spin"></i> Загрузка...</div>
        <div class="prize-count"><i class="fa-solid fa-gift"></i> Доступно: <span id="prize-limit">...</span> шт.</div>
    </div>

    <button class="btn-twitch" id="main-btn" onclick="claimAndGo()">
        <i class="fa-solid fa-play"></i> ПЕРЕЙТИ И ЗАБРАТЬ
    </button>

    <div id="result-msg" class="result-box"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const startParam = tg.initDataUnsafe?.start_param || urlParams.get('start_param') || "";
        
        let campaignId = null;
        let isTestMode = false;
        
        if (startParam === 'tw_test') {
            isTestMode = true;
            campaignId = 999;
        } else if (startParam.startsWith('tw_')) {
            const parts = startParam.split('_');
            campaignId = parseInt(parts[1]);
        }

        // Подгружаем информацию о призе при открытии страницы
        async function fetchPrizeInfo() {
            if (!campaignId) return;
            
            if (isTestMode) {
                document.getElementById('prize-name').innerText = "Кейс | Тестовый (Эмуляция)";
                document.getElementById('prize-limit').innerText = "10";
                document.getElementById('prize-card').style.display = "block";
                return;
            }

            try {
                const res = await fetch(`/api/v1/twitch/campaign_info/${campaignId}`);
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('prize-name').innerText = data.target_case_name;
                    document.getElementById('prize-limit').innerText = data.winners_limit;
                    document.getElementById('prize-card').style.display = "block";
                }
            } catch (e) {
                console.error("Не удалось загрузить инфу о призе");
            }
        }

        async function claimAndGo() {
            const btn = document.getElementById('main-btn');
            const resBox = document.getElementById('result-msg');
            
            if (!campaignId) {
                resBox.className = "result-box result-expired";
                resBox.innerText = "❌ Ссылка повреждена или устарела.";
                resBox.style.display = "block";
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                return;
            }

            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> ПРОВЕРКА...';
            btn.disabled = true;

            if (isTestMode) {
                setTimeout(() => {
                    resBox.className = "result-box result-winner";
                    resBox.innerText = "🛠 [ТЕСТ] 🎉 Красавчик, ты успел! Бесплатный кейс добавлен в твой профиль.";
                    resBox.style.display = "block";
                    btn.innerHTML = '<i class="fa-solid fa-check"></i> ПРИЯТНОГО ПРОСМОТРА';
                    if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    
                    setTimeout(() => {
                        tg.showAlert("Эмуляция завершена! В реальной жизни здесь открылся бы Твич.");
                        btn.innerHTML = '<i class="fa-solid fa-play"></i> ПЕРЕЙТИ И ЗАБРАТЬ';
                        btn.disabled = false;
                        resBox.style.display = "none";
                    }, 3000);
                }, 1500);
                return;
            }

            try {
                const res = await fetch('/api/v1/twitch/click', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        initData: tg.initData,
                        campaign_id: campaignId
                    })
                });
                
                const data = await res.json();
                resBox.style.display = "block";

                if (data.status === 'winner') {
                    resBox.className = "result-box result-winner";
                    if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                } else if (data.status === 'participant') {
                    resBox.className = "result-box result-participant";
                    if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning');
                } else {
                    resBox.className = "result-box result-expired";
                    if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                }
                
                resBox.innerText = data.message || "Успешно!";
                btn.innerHTML = '<i class="fa-solid fa-check"></i> ОТКРЫВАЮ СТРИМ...';

                if (data.twitch_url) {
                    setTimeout(() => {
                        tg.openLink(data.twitch_url);
                        tg.close();
                    }, 2500);
                }

            } catch (e) {
                resBox.className = "result-box result-expired";
                resBox.innerText = "⚠️ Сбой сети. Попробуй нажать еще раз.";
                resBox.style.display = "block";
                
                btn.innerHTML = '<i class="fa-solid fa-play"></i> ПЕРЕЙТИ И ЗАБРАТЬ';
                btn.disabled = false;
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
            }
        }

        // Запускаем подгрузку инфы о призе
        fetchPrizeInfo();
    </script>
</body>
</html>
