<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Редактор Профилей | HATElavka</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #1c1c1e;
            --bg-card: #2c2c2e;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --accent-blue: #007aff;
            --accent-gold: #ffd700;
            --accent-green: #34c759;
            --accent-red: #ff3b30;
            --accent-purple: #af52de;
            --accent-orange: #ff9500;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body { background-color: var(--bg-main); color: var(--text-main); -webkit-font-smoothing: antialiased; padding-bottom: 40px; }

        /* Поиск */
        .search-container { position: sticky; top: 0; background: rgba(28, 28, 30, 0.9); backdrop-filter: blur(10px); padding: 15px; z-index: 100; border-bottom: 1px solid var(--border); }
        .search-input { width: 100%; padding: 12px 16px; border-radius: 12px; background: var(--bg-card); border: 1px solid var(--border); color: white; font-size: 16px; outline: none; transition: border-color 0.2s; }
        .search-input:focus { border-color: var(--accent-blue); }
        .search-results { margin-top: 10px; max-height: 200px; overflow-y: auto; background: var(--bg-card); border-radius: 12px; }
        .search-item { padding: 12px 15px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; flex-direction: column; gap: 4px; }
        .search-item:last-child { border-bottom: none; }
        .search-item:active { background: rgba(255, 255, 255, 0.05); }
        
        /* Карточка профиля */
        .profile-container { padding: 20px 15px; display: none; animation: fadeIn 0.3s ease; }
        .profile-card { background: var(--bg-card); border-radius: 16px; padding: 20px; display: flex; align-items: center; gap: 15px; margin-bottom: 20px; border: 1px solid var(--border); }
        .profile-avatar { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; background: #000; }
        .profile-info { flex: 1; overflow: hidden; }
        .profile-name { font-size: 18px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .profile-badges { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; }
        .badge { font-size: 10px; padding: 3px 6px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        .badge.red { background: rgba(255, 59, 48, 0.2); color: var(--accent-red); }
        .badge.green { background: rgba(52, 199, 89, 0.2); color: var(--accent-green); }
        .badge.premium { background: rgba(255, 149, 0, 0.2); color: var(--accent-orange); }

        /* Сетка кнопок */
        .actions-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
        .action-btn { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 15px; display: flex; flex-direction: column; align-items: center; gap: 8px; color: white; cursor: pointer; transition: transform 0.1s, background 0.2s; }
        .action-btn:active { transform: scale(0.96); }
        .action-btn i { font-size: 24px; }
        .action-btn span { font-size: 13px; font-weight: 500; }
        .action-btn small { font-size: 11px; color: var(--text-muted); }

        /* Модальные окна (Bottom Sheet) */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s; display: flex; align-items: flex-end; justify-content: center; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: var(--bg-main); width: 100%; max-width: 500px; border-radius: 20px 20px 0 0; padding: 25px 20px 40px; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1); }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-title { font-size: 18px; font-weight: 600; }
        .close-btn { background: none; border: none; color: var(--text-muted); font-size: 24px; cursor: pointer; }

        /* Элементы форм */
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
        .form-input, .form-select { width: 100%; padding: 12px; border-radius: 10px; background: var(--bg-card); border: 1px solid var(--border); color: white; font-size: 16px; outline: none; }
        .submit-btn { width: 100%; padding: 14px; border-radius: 12px; background: var(--accent-blue); color: white; border: none; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .submit-btn.danger { background: var(--accent-red); }

        .loader { text-align: center; padding: 20px; color: var(--text-muted); display: none; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 Поиск: ID, @username, twitch..." autocomplete="off">
        <div id="searchResults" class="search-results"></div>
    </div>

    <div id="mainLoader" class="loader">
        <i class="fa-solid fa-spinner fa-spin fa-2x"></i>
        <p style="margin-top: 10px;">Загрузка профиля...</p>
    </div>

    <div id="profileContainer" class="profile-container">
        <div class="profile-card">
            <img id="userAvatar" src="" alt="Avatar" class="profile-avatar">
            <div class="profile-info">
                <div id="userName" class="profile-name">Загрузка...</div>
                <div style="font-size: 12px; color: var(--text-muted); margin-top: 2px;">ID: <span id="userId"></span></div>
                <div id="userBadges" class="profile-badges"></div>
            </div>
        </div>

        <div class="actions-grid">
            <button class="action-btn" onclick="openModal('coinsModal')" style="border-color: rgba(255, 215, 0, 0.3);">
                <i class="fa-solid fa-coins" style="color: var(--accent-gold);"></i>
                <span>Монеты</span>
                <small id="statCoins">...</small>
            </button>
            <button class="action-btn" onclick="openModal('ticketsModal')" style="border-color: rgba(0, 122, 255, 0.3);">
                <i class="fa-solid fa-ticket" style="color: var(--accent-blue);"></i>
                <span>Билеты</span>
                <small id="statTickets">...</small>
            </button>
            <button class="action-btn" onclick="openModal('trustModal')" style="border-color: rgba(175, 82, 222, 0.3);">
                <i class="fa-solid fa-shield-heart" style="color: var(--accent-purple);"></i>
                <span>Траст Фактор</span>
                <small id="statTrust">...</small>
            </button>
            <button class="action-btn" onclick="openModal('statusModal')" style="border-color: rgba(255, 59, 48, 0.3);">
                <i class="fa-solid fa-gavel" style="color: var(--accent-red);"></i>
                <span>Статусы</span>
                <small id="statStatus">Бан / Premium</small>
            </button>
        </div>
    </div>

    <div id="coinsModal" class="modal-overlay" onclick="closeOnDim(event)">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title"><i class="fa-solid fa-coins" style="color: var(--accent-gold);"></i> Управление Монетами</h3>
                <button class="close-btn" onclick="closeModal('coinsModal')">&times;</button>
            </div>
            <div class="input-group">
                <label>Действие</label>
                <select id="coinsAction" class="form-select">
                    <option value="add">Начислить (+)</option>
                    <option value="subtract">Списать (-)</option>
                </select>
            </div>
            <div class="input-group">
                <label>Количество</label>
                <input type="number" id="coinsAmount" class="form-input" placeholder="Например: 100" min="1">
            </div>
            <button class="submit-btn" onclick="submitCoins()">Применить</button>
        </div>
    </div>

    <div id="ticketsModal" class="modal-overlay" onclick="closeOnDim(event)">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title"><i class="fa-solid fa-ticket" style="color: var(--accent-blue);"></i> Управление Билетами</h3>
                <button class="close-btn" onclick="closeModal('ticketsModal')">&times;</button>
            </div>
            <div class="input-group">
                <label>Количество билетов для выдачи</label>
                <input type="number" id="ticketsAmount" class="form-input" placeholder="Например: 50" min="1">
            </div>
            <button class="submit-btn" onclick="submitTickets()">Выдать билеты</button>
        </div>
    </div>

    <div id="trustModal" class="modal-overlay" onclick="closeOnDim(event)">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title"><i class="fa-solid fa-shield-heart" style="color: var(--accent-purple);"></i> Траст Фактор</h3>
                <button class="close-btn" onclick="closeModal('trustModal')">&times;</button>
            </div>
            <p style="font-size: 12px; color: var(--accent-green); margin-bottom: 15px;">* При сохранении пользователю накрутится фейковая активность, чтобы избежать автоматических штрафов.</p>
            <div class="input-group">
                <label>Уровень траста (Цвет)</label>
                <select id="trustLevel" class="form-select">
                    <option value="green">Green (Зеленый)</option>
                    <option value="yellow">Yellow (Желтый)</option>
                    <option value="red">Red (Красный)</option>
                </select>
            </div>
            <div class="input-group">
                <label>Trust Score (Очки)</label>
                <input type="number" step="0.1" id="trustScore" class="form-input">
            </div>
            <div class="input-group">
                <label>Штрафные баллы</label>
                <input type="number" step="0.1" id="penaltyPoints" class="form-input">
            </div>
            <button class="submit-btn" onclick="submitTrust()">Сохранить Траст</button>
        </div>
    </div>

    <div id="statusModal" class="modal-overlay" onclick="closeOnDim(event)">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title"><i class="fa-solid fa-gavel" style="color: var(--accent-red);"></i> Бан и Доступы</h3>
                <button class="close-btn" onclick="closeModal('statusModal')">&times;</button>
            </div>
            <div class="input-group">
                <label>Блокировка аккаунта</label>
                <select id="isBanned" class="form-select" style="color: var(--accent-red);">
                    <option value="false">Активен</option>
                    <option value="true">ЗАБЛОКИРОВАН</option>
                </select>
            </div>
            <div class="input-group">
                <label>Checkpoint Premium</label>
                <select id="hasPremium" class="form-select" style="color: var(--accent-orange);">
                    <option value="false">Нет Premium</option>
                    <option value="true">Premium АКТИВЕН</option>
                </select>
            </div>
            <button class="submit-btn danger" onclick="submitStatus()">Обновить статусы</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentUser = null;
        let searchTimeout = null;

        // Минималистичный враппер для API (с подкидыванием initData)
        async function apiRequest(endpoint, payload = {}) {
            const url = endpoint;
            payload.initData = tg.initData;
            
            const response = await fetch(url, {
                method: 'POST', // Используем POST для всех действий, кроме получения профиля (если нужно)
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            if (!response.ok) throw new Error(data.detail || 'Ошибка сервера');
            return data;
        }
        
        async function apiGet(endpoint) {
            const url = `${endpoint}?initData=${encodeURIComponent(tg.initData)}`;
            const response = await fetch(url);
            const data = await response.json();
            if (!response.ok) throw new Error(data.detail || 'Ошибка сервера');
            return data;
        }

        // --- ЛОГИКА ПОИСКА ---
        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');

        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const term = e.target.value.trim();
            
            if (term.length < 2) {
                searchResults.innerHTML = '';
                return;
            }

            searchResults.innerHTML = '<div style="padding: 15px; text-align: center; color: var(--text-muted);">Ищем...</div>';
            
            searchTimeout = setTimeout(async () => {
                try {
                    const users = await apiRequest('/api/v1/admin/users/search', { query: term });
                    renderSearchResults(users);
                } catch (err) {
                    searchResults.innerHTML = `<div style="padding: 15px; color: var(--accent-red);">${err.message}</div>`;
                }
            }, 400);
        });

        function renderSearchResults(users) {
            if (!users || users.length === 0) {
                searchResults.innerHTML = '<div style="padding: 15px; text-align: center;">Ничего не найдено.</div>';
                return;
            }
            searchResults.innerHTML = users.map(u => `
                <div class="search-item" onclick="loadUser(${u.telegram_id})">
                    <strong style="font-size: 14px;">${u.full_name || 'Без имени'}</strong>
                    <span style="font-size: 12px; color: var(--text-muted);">ID: ${u.telegram_id} | Twitch: ${u.twitch_login || 'нет'}</span>
                </div>
            `).join('');
        }

        // --- ЗАГРУЗКА И РЕНДЕР ПРОФИЛЯ ---
        async function loadUser(id) {
            searchInput.value = '';
            searchResults.innerHTML = '';
            document.getElementById('profileContainer').style.display = 'none';
            document.getElementById('mainLoader').style.display = 'block';

            try {
                currentUser = await apiGet(`/api/v1/admin/users/${id}/full_profile`);
                
                // Заполняем UI
                document.getElementById('userAvatar').src = currentUser.photo_url || 'https://placehold.co/100?text=No+Photo';
                document.getElementById('userName').textContent = currentUser.full_name || 'Без имени';
                document.getElementById('userId').textContent = currentUser.telegram_id;

                // Бейджи
                let badgesHTML = '';
                if (currentUser.is_banned) badgesHTML += '<span class="badge red">BANNED</span>';
                if (currentUser.has_cp_premium) badgesHTML += '<span class="badge premium">PREMIUM</span>';
                if (currentUser.trust_level === 'red') badgesHTML += '<span class="badge red">LOW TRUST</span>';
                if (currentUser.trust_level === 'green') badgesHTML += '<span class="badge green">HIGH TRUST</span>';
                document.getElementById('userBadges').innerHTML = badgesHTML;

                // Статистика на кнопках
                document.getElementById('statCoins').textContent = `${currentUser.coins || 0} ⭐️`;
                document.getElementById('statTickets').textContent = `${currentUser.tickets || 0} 🎟️`;
                document.getElementById('statTrust').textContent = `Score: ${currentUser.trust_score || 0}`;
                document.getElementById('statStatus').textContent = currentUser.is_banned ? 'ЗАБАНЕН' : 'АКТИВЕН';

                // Заполняем инпуты модалок заранее
                document.getElementById('trustLevel').value = currentUser.trust_level || 'green';
                document.getElementById('trustScore').value = currentUser.trust_score || 0;
                document.getElementById('penaltyPoints').value = currentUser.penalty_points || 0;
                document.getElementById('isBanned').value = currentUser.is_banned ? "true" : "false";
                document.getElementById('hasPremium').value = currentUser.has_cp_premium ? "true" : "false";

                document.getElementById('mainLoader').style.display = 'none';
                document.getElementById('profileContainer').style.display = 'block';

            } catch (err) {
                document.getElementById('mainLoader').style.display = 'none';
                tg.showAlert(`Ошибка: ${err.message}`);
            }
        }

        // --- УПРАВЛЕНИЕ МОДАЛКАМИ ---
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function closeOnDim(e) { if(e.target.classList.contains('modal-overlay')) e.target.classList.remove('active'); }

        // --- API ДЕЙСТВИЯ (ОТПРАВКА) ---
        async function submitCoins() {
            const amount = parseFloat(document.getElementById('coinsAmount').value);
            const action = document.getElementById('coinsAction').value;
            if (!amount || amount <= 0) return tg.showAlert("Введите корректную сумму");
            
            tg.MainButton.showProgress();
            try {
                await apiRequest('/api/v1/admin/users/manage-coins', { user_id: currentUser.telegram_id, amount: amount, action_type: action });
                tg.showPopup({message: 'Успех!'});
                closeModal('coinsModal');
                document.getElementById('coinsAmount').value = '';
                loadUser(currentUser.telegram_id); // Обновляем профиль
            } catch (err) { tg.showAlert(err.message); }
            finally { tg.MainButton.hideProgress(); }
        }

        async function submitTickets() {
            const amount = parseInt(document.getElementById('ticketsAmount').value);
            if (!amount || amount <= 0) return tg.showAlert("Введите корректную сумму");

            tg.MainButton.showProgress();
            try {
                // Используем твой существующий эндпоинт
                await apiRequest('/api/v1/admin/users/grant-stars', { user_id_to_grant: currentUser.telegram_id, amount: amount });
                tg.showPopup({message: 'Билеты выданы!'});
                closeModal('ticketsModal');
                document.getElementById('ticketsAmount').value = '';
                loadUser(currentUser.telegram_id);
            } catch (err) { tg.showAlert(err.message); }
            finally { tg.MainButton.hideProgress(); }
        }

        async function submitTrust() {
            const payload = {
                user_id: currentUser.telegram_id,
                trust_level: document.getElementById('trustLevel').value,
                trust_score: parseFloat(document.getElementById('trustScore').value),
                penalty_points: parseFloat(document.getElementById('penaltyPoints').value)
            };

            tg.MainButton.showProgress();
            try {
                await apiRequest('/api/v1/admin/users/manage-trust', payload);
                tg.showPopup({message: 'Траст сохранен и защищен фейковой активностью!'});
                closeModal('trustModal');
                loadUser(currentUser.telegram_id);
            } catch (err) { tg.showAlert(err.message); }
            finally { tg.MainButton.hideProgress(); }
        }

        async function submitStatus() {
            const payload = {
                user_id: currentUser.telegram_id,
                is_banned: document.getElementById('isBanned').value === "true",
                has_cp_premium: document.getElementById('hasPremium').value === "true"
            };

            tg.MainButton.showProgress();
            try {
                await apiRequest('/api/v1/admin/users/manage-status', payload);
                tg.showPopup({message: 'Статусы обновлены!'});
                closeModal('statusModal');
                loadUser(currentUser.telegram_id);
            } catch (err) { tg.showAlert(err.message); }
            finally { tg.MainButton.hideProgress(); }
        }
    </script>
<script src="/top_nav.js" defer></script>
<script src="/bottom-nav.js" defer></script>
</body>
</html>
