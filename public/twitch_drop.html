<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HATElove Twitch Drop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        
        body {
            background-color: #0a0a0c; color: #fff; font-family: 'Montserrat', sans-serif;
            margin: 0; padding: 20px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; height: 100vh; text-align: center;
            box-sizing: border-box;
        }
        
        .twitch-logo { font-size: 80px; color: #9146FF; margin-bottom: 15px; filter: drop-shadow(0 0 20px rgba(145, 70, 255, 0.4)); }
        h1 { font-size: 26px; font-weight: 900; margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 1px; }
        p { font-size: 14px; color: #aaa; margin-bottom: 35px; line-height: 1.5; max-width: 300px; }
        
        .btn-twitch {
            background: #9146FF; color: #fff; border: none; padding: 20px;
            border-radius: 16px; font-size: 16px; font-weight: 900; width: 100%; max-width: 320px;
            text-transform: uppercase; cursor: pointer; transition: 0.2s;
            box-shadow: 0 8px 25px rgba(145, 70, 255, 0.4);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-twitch:active { transform: scale(0.96); box-shadow: 0 4px 15px rgba(145, 70, 255, 0.4); }
        .btn-twitch:disabled { opacity: 0.7; transform: none; }
        
        .result-box {
            margin-top: 25px; padding: 15px; border-radius: 12px; font-size: 14px; 
            font-weight: 700; display: none; width: 100%; max-width: 320px; box-sizing: border-box;
        }
        .result-winner { background: rgba(40, 167, 69, 0.15); border: 1px solid #28a745; color: #28a745; }
        .result-participant { background: rgba(255, 184, 0, 0.15); border: 1px solid #FFB800; color: #FFB800; }
        .result-expired { background: rgba(255, 77, 77, 0.15); border: 1px solid #ff4d4d; color: #ff4d4d; }
    </style>
</head>
<body>

    <i class="fa-brands fa-twitch twitch-logo"></i>
    <h1>TWITCH DROP</h1>
    <p>Жми на кнопку, чтобы перейти на прямую трансляцию. Успей в ТОП первых и забери бесплатный кейс в свой инвентарь!</p>

    <button class="btn-twitch" id="main-btn" onclick="claimAndGo()">
        <i class="fa-solid fa-play"></i> ПЕРЕЙТИ НА СТРИМ
    </button>

    <div id="result-msg" class="result-box"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Читаем параметры отовсюду (Telegram WebApp или обычный браузер)
        const urlParams = new URLSearchParams(window.location.search);
        const startParam = tg.initDataUnsafe?.start_param || urlParams.get('start_param') || "";
        
        let campaignId = null;
        let isTestMode = false;
        
        if (startParam === 'tw_test') {
            isTestMode = true;
            campaignId = 999; // Фейковый ID для тестов
        } else if (startParam.startsWith('tw_')) {
            const parts = startParam.split('_');
            campaignId = parseInt(parts[1]);
        }

        async function claimAndGo() {
            const btn = document.getElementById('main-btn');
            const resBox = document.getElementById('result-msg');
            
            if (!campaignId) {
                resBox.className = "result-box result-expired";
                resBox.innerText = "❌ Ссылка повреждена или устарела.";
                resBox.style.display = "block";
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                return;
            }

            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> ОБРАБОТКА...';
            btn.disabled = true;

            // === РЕЖИМ ЭМУЛЯЦИИ (ДЛЯ АДМИНА) ===
            if (isTestMode) {
                setTimeout(() => {
                    resBox.className = "result-box result-winner";
                    resBox.innerText = "🛠 [ТЕСТ] 🎉 Красавчик, ты успел! Бесплатный «Кейс | Тестовый» доступен в боте!";
                    resBox.style.display = "block";
                    btn.innerHTML = '<i class="fa-solid fa-check"></i> ПРИЯТНОГО ПРОСМОТРА';
                    if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    
                    setTimeout(() => {
                        tg.showAlert("Эмуляция завершена! В реальной жизни здесь открылся бы Твич.");
                        btn.innerHTML = '<i class="fa-solid fa-play"></i> ПЕРЕЙТИ НА СТРИМ';
                        btn.disabled = false;
                        resBox.style.display = "none";
                    }, 2500);
                }, 1500);
                return;
            }

            // === БОЕВОЙ РЕЖИМ ===
            try {
                const res = await fetch('/api/v1/twitch/click', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        initData: tg.initData,
                        campaign_id: campaignId
                    })
                });
                
                const data = await res.json();
                resBox.style.display = "block";

                if (data.status === 'winner') {
                    resBox.className = "result-box result-winner";
                    if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                } else if (data.status === 'participant') {
                    resBox.className = "result-box result-participant";
                    if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning');
                } else {
                    resBox.className = "result-box result-expired";
                    if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                }
                
                resBox.innerText = data.message || "Успешно!";
                btn.innerHTML = '<i class="fa-solid fa-check"></i> ПРИЯТНОГО ПРОСМОТРА';

                if (data.twitch_url) {
                    setTimeout(() => {
                        tg.openLink(data.twitch_url);
                        tg.close();
                    }, 2500);
                }

            } catch (e) {
                resBox.className = "result-box result-expired";
                resBox.innerText = "⚠️ Сбой сети. Попробуй нажать еще раз.";
                resBox.style.display = "block";
                
                btn.innerHTML = '<i class="fa-solid fa-play"></i> ПЕРЕЙТИ НА СТРИМ';
                btn.disabled = false;
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
            }
        }
    </script>
</body>
</html>
