<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HATElove - Управление Кодами</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap');

        :root {
            --gold-gradient: linear-gradient(180deg, #FFD700 0%, #E6AC00 100%);
            --orange-btn: linear-gradient(180deg, #FFB800 0%, #FF8A00 100%);
            --action-color: #007aff; 
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #0a0a0c;
            color: #fff;
            height: 100vh;
            display: flex; flex-direction: column;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* --- КНОПКА НАЗАД --- */
        .back-button {
            display: inline-flex; align-items: center; gap: 6px;
            background: none; border: none;
            color: var(--action-color);
            cursor: pointer; padding: 15px;
            text-decoration: none;
            font-family: -apple-system, sans-serif;
            font-size: 14px; font-weight: 600;
        }
        .back-button:active { opacity: 0.7; }

        /* --- SCREENS --- */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a0c; z-index: 20000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #ffd700; font-size: 20px; font-weight: 900; letter-spacing: 1px;
            transition: opacity 0.3s ease;
        }
        #access-denied {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a0c; z-index: 20000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #ff3b30; font-size: 24px; font-weight: 900;
        }
        .hidden { display: none !important; opacity: 0; pointer-events: none; }

        /* --- MAIN DASHBOARD --- */
        .dashboard { padding: 0 15px 20px 15px; flex-grow: 1; display: flex; flex-direction: column; }
        
        .header-title { font-size: 22px; font-weight: 900; margin: 0 0 20px 0; text-transform: uppercase; color: #fff; }

        .create-btn {
            background: var(--orange-btn); border: none; border-radius: 12px;
            padding: 16px; width: 100%; color: #000;
            font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 800;
            text-transform: uppercase; cursor: pointer; transition: transform 0.1s;
            margin-bottom: 20px; box-shadow: 0 4px 15px rgba(255, 184, 0, 0.3);
        }
        .create-btn:active { transform: scale(0.97); }

        /* --- СТАТУСЫ КОДОВ --- */
        .admin-list { flex-grow: 1; overflow-y: auto; padding-bottom: 20px; }
        
        .code-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px; border-bottom: 1px solid rgba(255,255,255,0.05);
            background: #1c1c1e; transition: 0.3s;
            border-radius: 10px; margin-bottom: 8px; border-left: 3px solid #333;
        }
        .code-item.copied { background: rgba(75, 105, 255, 0.1) !important; border-left: 3px solid #4b69ff; }
        .code-item.used { background: rgba(235, 75, 75, 0.1) !important; border-left: 3px solid #eb4b4b; }

        .code-text { font-weight: 800; font-family: monospace; font-size: 16px; letter-spacing: 1px; color: #ffd700; margin-bottom: 6px; }
        .code-item.used .code-text { text-decoration: line-through; opacity: 0.6; color: #aaa; }
        
        .code-target { font-size: 11px; color: #2AABEE; margin-bottom: 6px; font-weight: 700; display: inline-flex; align-items: center; gap: 4px; background: rgba(42, 171, 238, 0.1); padding: 2px 6px; border-radius: 4px; }
        .code-stats { font-size: 11px; color: #aaa; display: flex; gap: 12px; margin-bottom: 4px; }
        .code-stats span { display: flex; align-items: center; gap: 4px; }
        .code-desc { font-size: 10px; color: #666; font-style: italic; }

        .copy-btn-mini {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff;
            width: 36px; height: 36px; border-radius: 8px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 14px; transition: 0.2s; flex-shrink: 0; margin-left: 10px;
        }
        .copy-btn-mini:active { transform: scale(0.9); background: rgba(255,255,255,0.1); }

        /* --- MODAL --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 5000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;}
        .modal.active { display: flex; }
        .modal-box { background: #1c1c1e; padding: 25px; border-radius: 16px; width: 100%; max-width: 400px; border: 1px solid #333; position: relative; box-sizing: border-box; max-height: 90vh; overflow-y: auto;}
        
        .admin-input-group { margin-bottom: 15px; }
        .admin-input-group label { font-size: 11px; color: #888; text-transform: uppercase; font-weight: 700; margin-bottom: 6px; display: block; }
        .admin-input-group input, .admin-input-group textarea { 
            width: 100%; background: #0a0a0c; border: 1px solid #444; padding: 14px; color: #fff; 
            border-radius: 10px; box-sizing: border-box; font-size: 14px; outline: none; font-family: monospace;
        }
        .admin-input-group input::placeholder, .admin-input-group textarea::placeholder { color: #555; }
        .admin-input-group textarea { resize: vertical; min-height: 80px; }
        
        .modal-btn { padding: 14px; width: 100%; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; font-size: 14px; }
        .btn-gold { background: var(--orange-btn); color: #000; }
        .btn-grey { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1); }

    </style>
</head>
<body>

    <div id="loading-screen">
        <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 30px; margin-bottom: 15px;"></i>
        ПРОВЕРКА ДОСТУПА...
    </div>

    <div id="access-denied" class="hidden">
        <i class="fa-solid fa-shield-halved" style="font-size: 60px; margin-bottom: 20px; filter: drop-shadow(0 0 15px rgba(255,59,48,0.5));"></i>
        ДОСТУП ЗАКРЫТ
        <div style="font-size: 12px; color: #888; margin-top: 10px; font-weight: normal;">У вас нет прав администратора</div>
        <button class="back-button" style="margin-top: 30px; border: 1px solid var(--action-color); border-radius: 8px;" onclick="goBack()">Вернуться в бота</button>
    </div>

    <div id="main-admin-content" class="hidden" style="display: flex; flex-direction: column; height: 100%;">
        <a href="#" class="back-button" onclick="goBack()">
            <i class="fa-solid fa-chevron-left"></i> Назад
        </a>
        
        <div class="dashboard">
            <h1 class="header-title">Управление кодами</h1>
            
            <button class="create-btn" onclick="openAddModal()">
                <i class="fa-solid fa-plus" style="margin-right: 5px;"></i> Создать коды
            </button>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <div style="font-size: 12px; color: #888; font-weight: 700; text-transform: uppercase;">Список кодов</div>
                <div style="font-size: 10px; color: #666;"><i class="fa-solid fa-circle" style="color:#4b69ff"></i> Выдан &nbsp;&nbsp; <i class="fa-solid fa-circle" style="color:#eb4b4b"></i> Потрачен</div>
            </div>

            <div id="admin-codes-container" class="admin-list">
                </div>
        </div>
    </div>

    <div id="add-code-modal" class="modal">
        <div class="modal-box">
            <h3 style="margin-top: 0; margin-bottom: 20px; text-transform: uppercase;">Новые Коды</h3>
            
            <div class="admin-input-group">
                <label>Текст кода (Каждый с новой строки)</label>
                <textarea id="adm-code-val" placeholder="CODE1&#10;CODE2&#10;CODE3"></textarea>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="admin-input-group" style="margin-bottom: 0;">
                    <label>Название кейса</label>
                    <input id="adm-code-target" type="text" placeholder="Кейс | Лентяй">
                </div>
                <div class="admin-input-group" style="margin-bottom: 0;">
                    <label>Лимит открытий</label>
                    <input id="adm-code-max" type="number" value="1" min="1">
                </div>
            </div>

            <div class="admin-input-group" style="margin-top: 15px;">
                <label>Описание / Заметка (для себя)</label>
                <input id="adm-code-desc" type="text" placeholder="Для стрима 16.03">
            </div>
            
            <button id="btn-submit-codes" class="modal-btn btn-gold" onclick="apiAddCode()" style="margin-top: 15px;">СОЗДАТЬ</button>
            <button class="modal-btn btn-grey" onclick="closeModal('add-code-modal')">ОТМЕНА</button>
        </div>
    </div>

<script>
    // --- ИНИЦИАЛИЗАЦИЯ TELEGRAM ---
    const tg = window.Telegram?.WebApp;
    if (tg) {
        tg.ready();
        tg.expand();
        if (typeof tg.disableVerticalSwipes === 'function') tg.disableVerticalSwipes();
    }

    // --- ПЭЙЛОАД (ТГ/ВК) ---
    let isVk = false;
    (function initVkParams() {
        window.vkParams = null;
        const isValid = (str) => str && str.includes('vk_user_id') && str.includes('sign');
        try {
            let s = window.location.search; if (s.startsWith('?')) s = s.slice(1);
            if (isValid(s)) { window.vkParams = s; return; }
            let h = window.location.hash; if (h.startsWith('#') || h.startsWith('?')) h = h.slice(1);
            if (isValid(h)) { window.vkParams = h; return; }
            const href = window.location.href; const match = href.match(/(vk_user_id=[^#]*)/);
            if (match && match[1] && match[1].includes('sign')) { window.vkParams = match[1]; return; }
        } catch (e) {}
    })();

    function getAuthPayload() {
        let rawData = window.vkParams || window.Telegram?.WebApp?.initData || window.location.search || window.location.hash || '';
        if (rawData.startsWith('?') || rawData.startsWith('#')) rawData = rawData.slice(1);

        if (rawData.includes('vk_app_id') || rawData.includes('vk_user_id')) {
            isVk = true;
            if (typeof vkBridge !== 'undefined') { try { vkBridge.send('VKWebAppInit'); } catch(e){} }
            return { initData: rawData, platform: 'vk' };
        }
        isVk = false;
        return { initData: rawData, platform: 'tg' };
    }

    const payload = getAuthPayload();
    const initData = payload.initData;

    // --- УТИЛИТЫ ---
    function notify(msg) {
        if (tg && tg.showPopup) {
            tg.showPopup({ title: 'Система', message: msg, buttons: [{type: 'ok'}] });
        } else {
            alert(msg);
        }
    }

    function goBack() {
        window.location.href = '/menu'; 
    }

    function openAddModal() { document.getElementById('add-code-modal').classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    function escapeHTML(str) {
        if (typeof str !== 'string') return str;
        return str.replace(/[&<>"']/g, match => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[match]);
    }

    // --- ПРОВЕРКА ПРАВ И ЗАГРУЗКА ---
    async function initAdminPanel() {
        try {
            const res = await fetch('/api/v1/user/me', {
                method: 'POST', 
                body: JSON.stringify(payload), 
                headers: {'Content-Type': 'application/json'}
            });
            const user = await res.json();

            document.getElementById('loading-screen').classList.add('hidden');

            if (!user || !user.is_admin) {
                document.getElementById('access-denied').classList.remove('hidden');
                if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                return;
            }

            document.getElementById('main-admin-content').classList.remove('hidden');
            loadCodesListAPI();

        } catch (e) {
            console.error("Auth error:", e);
            document.getElementById('loading-screen').innerHTML = '<div style="color:red; text-align:center;">Ошибка подключения к серверу.<br>Обновите страницу.</div>';
        }
    }

    // --- ЗАГРУЗКА СПИСКА КОДОВ ---
    async function loadCodesListAPI() {
        const container = document.getElementById('admin-codes-container');
        container.innerHTML = '<div style="text-align:center; padding:40px; color:#888;"><i class="fa-solid fa-circle-notch fa-spin"></i> Загрузка кодов...</div>';

        try {
            const res = await fetch('/api/admin/cs/codes/list', {
                method: 'POST', 
                body: JSON.stringify(payload), 
                headers: {'Content-Type': 'application/json'}
            });
            const codes = await res.json();

            if (!Array.isArray(codes)) {
                container.innerHTML = `<div style="text-align:center; color:#ff3b30; padding:20px;">Ошибка сервера.</div>`;
                return;
            }

            if (codes.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:40px; color:#666;"><i class="fa-solid fa-ghost" style="font-size:40px; margin-bottom:10px;"></i><br>Пока нет ни одного кода</div>';
                return;
            }

            // Сортировка (сначала новые или активные, потом старые)
            codes.sort((a, b) => b.idx - a.idx);

            let html = '';
            codes.forEach(c => {
                // Извлекаем точные данные
                const maxUses = c.max_uses || 1;
                const currentUses = c.current_uses !== undefined ? c.current_uses : 0;
                
                // Считаем, сколько людей ввели код, но еще не открыли кейс
                let activatedCount = 0;
                if (Array.isArray(c.activated_by_ids)) activatedCount = c.activated_by_ids.length;

                const targetName = c.target_case_name ? escapeHTML(c.target_case_name) : 'На все кейсы';
                const descHtml = c.description ? `<div class="code-desc">${escapeHTML(c.description)}</div>` : '';
                
                let statusClass = '';
                let icon = '<i class="fa-regular fa-copy"></i>';

                // Логика покраски
                if (currentUses >= maxUses) {
                    statusClass = 'used'; // Красный (Лимит исчерпан)
                    icon = '<i class="fa-solid fa-check"></i>';
                } 
                else if (c.is_copied || activatedCount > 0) {
                    statusClass = 'copied'; // Синий (Выдан или уже активирован кем-то)
                    icon = '<i class="fa-solid fa-share"></i>';
                }

                html += `
                <div class="code-item ${statusClass}" id="code-card-${c.code}">
                    <div style="flex-grow: 1; padding-right: 10px; overflow: hidden;">
                        <div class="code-text">${c.code}</div>
                        <div class="code-target"><i class="fa-solid fa-box"></i> ${targetName}</div>
                        <div class="code-stats">
                            <span><i class="fa-solid fa-hourglass-half"></i> Ждут: <b>${activatedCount}</b></span>
                            <span><i class="fa-solid fa-unlock"></i> Открыто: <b>${currentUses}/${maxUses}</b></span>
                        </div>
                        ${descHtml}
                    </div>
                    <button class="copy-btn-mini" onclick="copyAndMarkCode('${c.code}', this)">
                        ${icon}
                    </button>
                </div>`;
            });

            container.innerHTML = html;

        } catch (e) {
            container.innerHTML = `<div style="text-align:center; color:#ff3b30; padding:20px;">Ошибка JS: ${e.message}</div>`;
        }
    }

    // --- СОЗДАНИЕ КОДОВ ---
    async function apiAddCode() {
        const rawText = document.getElementById('adm-code-val').value;
        const maxUses = parseInt(document.getElementById('adm-code-max').value) || 1;
        const targetCase = document.getElementById('adm-code-target').value.trim();
        const description = document.getElementById('adm-code-desc').value.trim();
        
        const codes = rawText.split('\n').map(c => c.trim()).filter(c => c !== '');
        
        if(codes.length === 0) return notify("Введите хотя бы один код!");

        const btn = document.getElementById('btn-submit-codes');
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> СОЗДАНИЕ...';

        try {
            // Отправляем все нужные параметры на сервер
            for (const code of codes) {
                const payloadToSend = { 
                    ...payload, 
                    code: code, 
                    max_uses: maxUses,
                    target_case_name: targetCase || null,
                    description: description || null
                };

                await fetch('/api/admin/cs/code/add', { 
                    method: 'POST', 
                    body: JSON.stringify(payloadToSend), 
                    headers: {'Content-Type': 'application/json'} 
                });
            }
            
            if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            
            // Очищаем форму
            document.getElementById('adm-code-val').value = '';
            document.getElementById('adm-code-target').value = '';
            document.getElementById('adm-code-desc').value = '';
            
            closeModal('add-code-modal');
            loadCodesListAPI(); // Обновляем список

        } catch(e) {
            console.error(e);
            notify("Произошла ошибка при создании.");
        } finally {
            btn.disabled = false;
            btn.innerHTML = 'СОЗДАТЬ';
        }
    }

    // --- КОПИРОВАНИЕ И ПОМЕТКА "СИНИМ" ---
    async function copyAndMarkCode(codeText, btnElement) {
        const template = `t.me/HATElavka_bot/roulette\n\n\`${codeText}\`\n\nАктивируй секретный код в боте!`;

        try {
            await navigator.clipboard.writeText(template);
            if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            
            btnElement.innerHTML = '<i class="fa-solid fa-check" style="color:#34c759"></i>';
            
            await fetch('/api/admin/cs/code/mark_copied', {
                method: 'POST',
                body: JSON.stringify({ ...payload, code: codeText }),
                headers: {'Content-Type': 'application/json'}
            });

            // Красим карточку в синий (если она еще не красная/использованная)
            const card = document.getElementById(`code-card-${codeText}`);
            if (card && !card.classList.contains('used')) {
                card.classList.add('copied');
            }

        } catch (e) {
            console.error(e);
            notify("Не удалось скопировать. Проверьте разрешения браузера.");
        }
    }

    // --- СТАРТ ---
    initAdminPanel();

</script>
</body>
</html>
